<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Permissions</h3>
            </div>
            <div class="card-body">
                <form method="post" id="permission-form-modal" action="{% url 'edit_user_permissions' user.id %}">
                    {% csrf_token %}
                    <!-- Champ de recherche -->
                    <div class="form-group mb-3">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-search"></i>
                                </span>
                            </div>
                            <input type="text" 
                                   id="permission-search" 
                                   class="form-control" 
                                   placeholder="Rechercher une permission..." 
                                   autocomplete="off">
                            <div class="input-group-append">
                                <button type="button" 
                                        class="btn btn-outline-secondary" 
                                        id="clear-search" 
                                        style="display: none;">
                                    <i class="fa fa-times"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="row" id="permissions-container">
                        {% if form.permissions %}
                            {% for permission in form.permissions %}
                                <div class="col-md-4 form-group permission-item" data-permission-text="{{ permission.choice_label|lower }}">
                                    <div class="form-check">
                                        {{ permission.tag }}
                                        <label class="form-check-label" for="{{ permission.id_for_label }}">
                                            {{ permission.choice_label }}
                                        </label>
                                    </div>
                                </div>
                            {% endfor %}
                        {% else %}
                            <div class="col-12">
                                <p class="text-muted">Aucune permission disponible.</p>
                            </div>
                        {% endif %}
                    </div>
                    <div id="no-results" class="alert alert-info" style="display: none;">
                        <i class="fa fa-info-circle"></i> Aucune permission trouvée pour votre recherche.
                    </div>
                    <div class="form-group mt-3 text-center">
                        <button type="submit" class="btn btn-outline-primary w-50" style='border-radius:50px'>Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    $(document).ready(function() {
        // Fonction de recherche dynamique
        function filterPermissions() {
            var searchText = $('#permission-search').val().toLowerCase().trim();
            var visibleCount = 0;
            var totalCount = $('.permission-item').length;
            
            if (searchText === '') {
                // Afficher toutes les permissions
                $('.permission-item').show();
                $('#clear-search').hide();
                $('#no-results').hide();
            } else {
                // Filtrer les permissions
                $('.permission-item').each(function() {
                    var permissionText = $(this).data('permission-text') || '';
                    if (permissionText.indexOf(searchText) !== -1) {
                        $(this).show();
                        visibleCount++;
                    } else {
                        $(this).hide();
                    }
                });
                
                // Afficher/masquer le bouton de nettoyage
                $('#clear-search').show();
                
                // Afficher le message si aucune permission trouvée
                if (visibleCount === 0) {
                    $('#no-results').show();
                } else {
                    $('#no-results').hide();
                }
            }
        }
        
        // Écouter les changements dans le champ de recherche
        $('#permission-search').on('input', function() {
            filterPermissions();
        });
        
        // Bouton pour effacer la recherche
        $('#clear-search').on('click', function() {
            $('#permission-search').val('');
            filterPermissions();
            $('#permission-search').focus();
        });
        
        // Raccourci clavier pour se concentrer sur la recherche (Ctrl+F ou Cmd+F)
        $(document).on('keydown', function(e) {
            // Vérifier si la modal est ouverte
            if ($('#permissionModal').hasClass('show')) {
                // Ctrl+F ou Cmd+F
                if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                    e.preventDefault();
                    $('#permission-search').focus();
                }
                // Échap pour effacer la recherche
                if (e.key === 'Escape' && $('#permission-search').is(':focus')) {
                    $('#permission-search').val('');
                    filterPermissions();
                }
            }
        });
    });
</script>
