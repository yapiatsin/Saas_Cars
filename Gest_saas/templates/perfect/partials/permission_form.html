<form method="post" id="permissionUpdateForm" action="{% url 'update_permission' object.id %}" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="modal-header">
        <h5 class="modal-title">
            Modifier la permission <b>{{ object.name }}</b>
        </h5>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
    </div>

    <div class="modal-body row">
        <div class="form-group col-md-12">
            <label>Nom de la permission</label>
            {{ form.name }}
        </div>
        <div class="form-group col-md-6">
            <label>Catégorie</label>
            {{ form.categorie }}
        </div>
        <div class="form-group col-md-6">
            <label>URL</label>
            {{ form.url }}
        </div>
    </div>

    <div class="modal-footer justify-content-between p-2">
        <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Annuler</button>
        <button type="submit" class="btn btn-outline-success">Enregistrer</button>
    </div>
</form>
